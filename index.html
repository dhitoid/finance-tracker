<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
}

body{
  background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
  color:#fff;
  min-height:100vh;
}

/* Container */
.app{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* Header */
header h1{
  font-size:30px;
  font-weight:600;
}

header p{
  opacity:0.5;
  margin-top:4px;
}

/* Glass Card */
.card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  padding:20px;
  border-radius:24px;
  margin-top:15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Balance */
.balance{
  position:relative;
  overflow:hidden;
}

.balance::before{
  content:'';
  position:absolute;
  width:200px;
  height:200px;
  background: radial-gradient(circle, #00ffae33, transparent);
  top:-50px;
  right:-50px;
}

.balance h2{
  font-weight:400;
  opacity:0.6;
}

.balance h1{
  font-size:34px;
  margin-top:10px;
}

/* Summary */
.summary{
  display:flex;
  gap:10px;
}

.summary div{
  flex:1;
  padding:15px;
  border-radius:16px;
  background: rgba(255,255,255,0.04);
}

.summary p{
  font-size:13px;
  opacity:0.6;
}

.summary h3{
  margin-top:5px;
}

/* Transactions */
.transactions h2{
  margin-top:20px;
  font-size:18px;
  opacity:0.8;
}

.transactions ul{
  margin-top:10px;
}

.transactions li{
  background: rgba(255,255,255,0.05);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}

.transactions li:hover{
  transform:scale(1.02);
}

.income{
  border-left:4px solid #00ffae;
}

.expense{
  border-left:4px solid #ff4d6d;
}

/* Floating Button */
.add-btn{
  position:fixed;
  bottom:30px;
  right:30px;
  width:65px;
  height:65px;
  border:none;
  border-radius:20px;
  font-size:30px;
  color:#fff;
  cursor:pointer;
  background: linear-gradient(135deg, #00ffae, #00cfff);
  box-shadow:0 10px 25px rgba(0,255,174,0.4);
  transition:0.2s;
}

.add-btn:hover{
  transform:scale(1.1);
}

/* Modal */
.modal{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background: rgba(28,28,30,0.95);
  border-radius:20px;
  padding:20px;
  width:90%;
  animation:fadeUp 0.3s ease;
}

@keyframes fadeUp{
  from{
    transform:translateY(40px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

.modal-content h2{
  margin-bottom:10px;
}

.modal-content input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  background:#2c2c2e;
  color:#fff;
}

.modal-content button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#00ffae,#00cfff);
  color:#000;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

  <header>
    <h1>My Finance</h1>
    <p id="date"></p>
  </header>

  <div class="card balance">
    <h2>Saldo</h2>
    <h1 id="balance">Rp 0</h1>
  </div>

  <div class="summary">
    <div>
      <p>Pemasukan</p>
      <h3 id="income">Rp 0</h3>
    </div>
    <div>
      <p>Pengeluaran</p>
      <h3 id="expense">Rp 0</h3>
    </div>
  </div>

  <div class="transactions">
    <h2>Transaksi</h2>
    <ul id="list"></ul>
  </div>

</div>

<button class="add-btn" onclick="openModal()">＋</button>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Tambah Transaksi</h2>
    <input type="text" id="text" placeholder="Deskripsi">
    <input type="number" id="amount" placeholder="Jumlah (gunakan - untuk pengeluaran)">
    <button onclick="addTransaction()">Simpan</button>
  </div>
</div>

<script>
const balanceEl = document.getElementById('balance');
const incomeEl = document.getElementById('income');
const expenseEl = document.getElementById('expense');
const list = document.getElementById('list');

let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

function formatRupiah(num){
  return 'Rp ' + num.toLocaleString('id-ID');
}

function updateUI(){
  list.innerHTML = '';

  let income = 0;
  let expense = 0;

  transactions.forEach((t)=>{
    const li = document.createElement('li');
    li.classList.add(t.amount > 0 ? 'income' : 'expense');

    li.innerHTML = `
      ${t.text}
      <span>${formatRupiah(t.amount)}</span>
    `;

    list.appendChild(li);

    if(t.amount > 0) income += t.amount;
    else expense += t.amount;
  });

  balanceEl.innerText = formatRupiah(income + expense);
  incomeEl.innerText = formatRupiah(income);
  expenseEl.innerText = formatRupiah(Math.abs(expense));

  localStorage.setItem('transactions', JSON.stringify(transactions));
}

function addTransaction(){
  const text = document.getElementById('text').value;
  const amount = +document.getElementById('amount').value;

  if(!text || !amount) return alert('Isi semua!');

  transactions.push({text, amount});

  closeModal();
  updateUI();

  document.getElementById('text').value = '';
  document.getElementById('amount').value = '';
}

function openModal(){
  document.getElementById('modal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

window.onclick = function(e){
  const modal = document.getElementById('modal');
  if(e.target == modal){
    closeModal();
  }
}

function checkMonthlyReset(){
  const lastMonth = localStorage.getItem('month');
  const currentMonth = new Date().getMonth();

  if(lastMonth == null){
    localStorage.setItem('month', currentMonth);
  } else if(lastMonth != currentMonth){
    transactions = [];
    localStorage.setItem('month', currentMonth);
  }
}

document.getElementById('date').innerText =
  new Date().toLocaleDateString('id-ID', {
    weekday:'long',
    day:'numeric',
    month:'long',
    year:'numeric'
  });

checkMonthlyReset();
updateUI();
</script>

</body>
</html>
