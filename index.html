<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>

<style>
:root{
  --bg:#0b0b0c;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --accent:#00ffae;
  --danger:#ff4d6d;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background: radial-gradient(circle at top,#1a1a1a,#000);
  color:#fff;
  min-height:100vh;
}

/* Container */
.app{
  max-width:420px;
  margin:auto;
  padding:20px;
  padding-bottom:120px;
}

/* Header */
header{
  position:sticky;
  top:0;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.4);
  padding-bottom:10px;
  z-index:10;
}

header h1{
  font-size:30px;
  font-weight:600;
}

header p{
  opacity:0.5;
  font-size:13px;
}

/* Card */
.card{
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(25px);
  border-radius:26px;
  padding:20px;
  margin-top:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
  transition:0.25s;
}

.card:active{
  transform:scale(0.98);
}

/* Balance */
.balance{
  position:relative;
  overflow:hidden;
}

.balance::after{
  content:'';
  position:absolute;
  width:250px;
  height:250px;
  background: radial-gradient(circle, rgba(0,255,174,0.15), transparent);
  top:-80px;
  right:-80px;
}

.balance h2{
  font-weight:400;
  opacity:0.6;
}

.balance h1{
  font-size:36px;
  margin-top:10px;
}

/* Summary */
.summary{
  display:flex;
  gap:12px;
}

.summary div{
  flex:1;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
}

.summary h3{
  margin-top:5px;
}

/* Transactions */
.transactions h2{
  margin-top:20px;
  font-size:16px;
  opacity:0.7;
}

.transactions li{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:14px;
  margin-top:10px;
  transition:0.2s;
}

.transactions li:active{
  transform:scale(0.97);
}

.income{
  border-left:4px solid var(--accent);
}

.expense{
  border-left:4px solid var(--danger);
}

/* Floating Button */
.add-btn{
  position:fixed;
  bottom:30px;
  right:30px;
  width:70px;
  height:70px;
  border:none;
  border-radius:22px;
  font-size:32px;
  color:#000;
  background:linear-gradient(135deg,#00ffae,#00cfff);
  box-shadow:0 15px 30px rgba(0,255,174,0.4);
  cursor:pointer;
  transition:0.2s;
}

.add-btn:active{
  transform:scale(0.9);
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:flex-end;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

.modal-content{
  width:100%;
  background:#1c1c1e;
  border-radius:24px 24px 0 0;
  padding:20px;
  animation:slideUp 0.3s ease;
}

@keyframes slideUp{
  from{
    transform:translateY(100%);
  }
  to{
    transform:translateY(0);
  }
}

.modal-content input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  background:#2c2c2e;
  color:#fff;
}

.modal-content button{
  margin-top:15px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  background:linear-gradient(135deg,#00ffae,#00cfff);
}

/* iPhone Safe Area */
@supports(padding:max(0px)){
  .app{
    padding-bottom:max(120px,env(safe-area-inset-bottom));
  }
}
</style>
</head>

<body>

<div class="app">

<header>
  <h1>My Finance</h1>
  <p id="date"></p>
</header>

<div class="card balance">
  <h2>Saldo</h2>
  <h1 id="balance">Rp 0</h1>
</div>

<div class="summary">
  <div>
    <p>Pemasukan</p>
    <h3 id="income">Rp 0</h3>
  </div>
  <div>
    <p>Pengeluaran</p>
    <h3 id="expense">Rp 0</h3>
  </div>
</div>

<div class="transactions">
  <h2>Transaksi</h2>
  <ul id="list"></ul>
</div>

</div>

<button class="add-btn" onclick="openModal()">＋</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Tambah Transaksi</h2>
    <input id="text" placeholder="Deskripsi">
    <input id="amount" type="number" placeholder="Jumlah (- untuk keluar)">
    <button onclick="addTransaction()">Simpan</button>
  </div>
</div>

<script>
const balanceEl = document.getElementById('balance');
const incomeEl = document.getElementById('income');
const expenseEl = document.getElementById('expense');
const list = document.getElementById('list');

let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

function formatRupiah(num){
  return 'Rp ' + num.toLocaleString('id-ID');
}

function updateUI(){
  list.innerHTML = '';
  let income=0, expense=0;

  transactions.forEach(t=>{
    const li=document.createElement('li');
    li.classList.add(t.amount>0?'income':'expense');

    li.innerHTML=`${t.text}<span>${formatRupiah(t.amount)}</span>`;
    list.appendChild(li);

    if(t.amount>0) income+=t.amount;
    else expense+=t.amount;
  });

  balanceEl.innerText=formatRupiah(income+expense);
  incomeEl.innerText=formatRupiah(income);
  expenseEl.innerText=formatRupiah(Math.abs(expense));

  localStorage.setItem('transactions', JSON.stringify(transactions));
}

function addTransaction(){
  const text=document.getElementById('text').value;
  const amount=+document.getElementById('amount').value;

  if(!text||!amount) return alert('Isi semua');

  transactions.push({text,amount});
  closeModal();
  updateUI();

  text.value='';
  amount.value='';
}

function openModal(){
  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

window.onclick=e=>{
  if(e.target.id==='modal') closeModal();
};

document.getElementById('date').innerText=
new Date().toLocaleDateString('id-ID',{
  weekday:'long',day:'numeric',month:'long',year:'numeric'
});

updateUI();
</script>

</body>
</html>
